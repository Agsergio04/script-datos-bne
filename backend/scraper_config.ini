# Configuración del Scraper BNE
# Este archivo contiene ejemplos de búsquedas y configuraciones

[FUENTE]
# Portal de datos enlazados de la BNE
portal = https://datos.bne.es
descripcion = Portal de publicación de datos como Linked Open Data de la Biblioteca Nacional de España
licencia = CC0 (Creative Commons Public Domain Dedication)

[AUTORES]
# Autores españoles famosos con mucha información en datos.bne.es
autores = [
    "Federico García Lorca",      # Poeta y dramaturgo (1898-1936)
    "Miguel de Cervantes",        # Autor de El Quijote
    "Antonio Machado",            # Poeta de la Generación del 98
    "Benito Pérez Galdós",        # Novelista realista
    "Ramón y Cajal",              # Premio Nobel, científico
    "Emilia Pardo Bazán",         # Novelista y ensayista gallega
    "Juan Valera",                # Novelista del siglo XIX
    "Gustavo Adolfo Bécquer",     # Poeta romántico
    "Leopoldo Alas (Clarín)",     # Escritor y crítico
    "Vicente Blasco Ibáñez"       # Novelista y político
]

[PERIODICOS]
# Periódicos históricos españoles
periodicos = [
    "ABC",                        # Fundado en 1903 (Madrid)
    "La Vanguardia",             # Fundado en 1881 (Barcelona)
    "El Mundo",                  # Fundado en 1989
    "Diario de Madrid",          # Histórico
    "El País",                   # Fundado en 1976
    "Blanco y Negro",            # Revista histórica
    "La Ilustración Española",   # Revista del XIX
    "El Imparcial",              # Periódico clásico
    "Nuevo Mundo",               # Revista ilustrada
    "La Época"                   # Periódico histórico
]

[OPCIONES_BUSQUEDA]
# Parámetros de búsqueda
limite_resultados = 50
tipo_busqueda = autores, periodicos, obras, temas
timeout_segundos = 30
reintentos = 3
espera_entre_peticiones = 2

[EXPORTACION]
# Formatos de exportación de datos
formatos = json, csv, rdf, xml
directorio_salida = ./datos_exportados
incluir_timestamp = true
comprimir = false

[INTEGRACION_BD]
# Integración con PostgreSQL
host = localhost
puerto = 5432
base_datos = bne_db
usuario = bne_user
# Contraseña en .env por seguridad

[LOGGING]
# Configuración de logs
nivel = INFO
archivo_log = bne_scraper.log
formato = %(asctime)s - %(levelname)s - %(message)s
console_output = true
